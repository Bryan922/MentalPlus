<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Admin - MentalSerenity</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">MentalSerenity</a>
        </div>
        <div class="auth-buttons">
            <!-- Les boutons seront ajoutés dynamiquement par le JavaScript -->
        </div>
    </nav>

    <div class="admin-container">
        <!-- Menu de navigation -->
        <div class="admin-nav">
            <button class="nav-item active" data-section="dashboard">
                <i class="fas fa-chart-line"></i>
                <span>Tableau de bord</span>
            </button>
            <button class="nav-item" data-section="appointments">
                <i class="fas fa-calendar-alt"></i>
                <span>Rendez-vous</span>
            </button>
            <button class="nav-item" data-section="admins">
                <i class="fas fa-user-shield"></i>
                <span>Administrateurs</span>
            </button>
        </div>

        <!-- Section Tableau de bord -->
        <div class="admin-section dashboard-section active">
            <!-- Statistiques -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <i class="fas fa-calendar-day"></i>
                    </div>
                    <div class="stat-value today-appointments-count">0</div>
                    <div class="stat-label">Rendez-vous aujourd'hui</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <i class="fas fa-calendar-week"></i>
                    </div>
                    <div class="stat-value week-appointments-count">0</div>
                    <div class="stat-label">Rendez-vous cette semaine</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-value total-clients-count">0</div>
                    <div class="stat-label">Clients inscrits</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                    <div class="stat-value total-appointments-count">0</div>
                    <div class="stat-label">Total des rendez-vous</div>
                </div>
            </div>

            <!-- Rendez-vous du jour -->
            <div class="today-appointments">
                <h3><i class="fas fa-calendar-day"></i> Rendez-vous du jour</h3>
                <div class="today-appointments-list">
                    <!-- Les rendez-vous seront ajoutés dynamiquement ici -->
                </div>
            </div>
        </div>

        <!-- Section Rendez-vous -->
        <div class="admin-section appointments-section">
            <!-- Calendrier -->
            <div class="calendar-container">
                <div class="calendar-header">
                    <h3>Janvier 2024</h3>
                    <div class="calendar-nav">
                        <button class="prev-month">
                            <i class="fas fa-chevron-left"></i>
                            Précédent
                        </button>
                        <button class="next-month">
                            Suivant
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="calendar-grid">
                    <!-- Le calendrier sera généré dynamiquement ici -->
                </div>
            </div>
        </div>

        <!-- Section Administrateurs -->
        <div class="admin-section admins-section">
            <div class="section-header">
                <h2>Gestion des administrateurs</h2>
                <button class="btn-action" onclick="showAddAdminModal()">
                    <i class="fas fa-plus"></i> Nouvel administrateur
                </button>
            </div>

            <div class="admins-list">
                <!-- La liste des administrateurs sera générée dynamiquement ici -->
            </div>
        </div>
    </div>

    <!-- Template pour le modal d'ajout d'administrateur -->
    <template id="add-admin-modal">
        <div class="modal">
            <div class="modal-content">
                <h3>Ajouter un administrateur</h3>
                <form id="add-admin-form">
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" name="name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label>Droits d'accès</label>
                        <div class="permissions-grid">
                            <label class="permission-item">
                                <input type="checkbox" name="permissions" value="dashboard">
                                <span>Tableau de bord</span>
                            </label>
                            <label class="permission-item">
                                <input type="checkbox" name="permissions" value="appointments">
                                <span>Gestion des rendez-vous</span>
                            </label>
                            <label class="permission-item">
                                <input type="checkbox" name="permissions" value="clients">
                                <span>Gestion des clients</span>
                            </label>
                            <label class="permission-item">
                                <input type="checkbox" name="permissions" value="employees">
                                <span>Gestion des employés</span>
                            </label>
                            <label class="permission-item">
                                <input type="checkbox" name="permissions" value="admins">
                                <span>Gestion des administrateurs</span>
                            </label>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeModal()">Annuler</button>
                        <button type="submit" class="btn-action">Ajouter</button>
                    </div>
                </form>
            </div>
        </div>
    </template>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
