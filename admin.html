<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - MentalSerenity</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">MentalSerenity</a>
            </div>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="index.html#services">Nos Services</a></li>
                <li><a href="rendez-vous.html">Prendre RDV</a></li>
                <li><a href="#" onclick="logout()">Déconnexion</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">
        <aside class="admin-sidebar">
            <nav class="admin-nav">
                <a href="#planning" class="active" onclick="showSection('planning')">
                    <i class="fas fa-calendar"></i>Planning
                </a>
                <a href="#clients" onclick="showSection('clients')">
                    <i class="fas fa-users"></i>Liste des clients
                </a>
                <a href="#employees" onclick="showSection('employees')">
                    <i class="fas fa-user-tie"></i>Gestion des employés
                </a>
                <a href="#chat" onclick="showSection('chat')">
                    <i class="fas fa-comments"></i>Messagerie
                </a>
                <a href="#settings" onclick="showSection('settings')">
                    <i class="fas fa-cog"></i>Paramètres
                </a>
            </nav>
        </aside>

        <main class="admin-content">
            <!-- Section Planning -->
            <section id="planning" class="admin-section active">
                <h2>Planning des rendez-vous</h2>
                <div class="admin-calendar">
                    <div class="calendar-header">
                        <button class="btn-primary" onclick="previousMonth()">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <h3 id="current-month">Septembre 2023</h3>
                        <button class="btn-primary" onclick="nextMonth()">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid">
                        <!-- Le calendrier sera généré en JavaScript -->
                    </div>
                </div>
                <div id="appointments-list">
                    <!-- La liste des rendez-vous sera générée en JavaScript -->
                </div>
            </section>

            <!-- Section Clients -->
            <section id="clients" class="admin-section">
                <h2>Liste des clients</h2>
                <div class="search-filters">
                    <input type="text" placeholder="Rechercher un client..." onkeyup="filterClients(this.value)">
                </div>
                <div class="clients-list" id="clients-list">
                    <!-- La liste des clients sera générée en JavaScript -->
                </div>
            </section>

            <!-- Section Employés -->
            <section id="employees" class="admin-section">
                <h2>Gestion des employés</h2>
                <button class="btn-primary" onclick="showAddEmployeeModal()">
                    <i class="fas fa-plus"></i> Ajouter un employé
                </button>
                <div class="employees-list" id="employees-list">
                    <!-- La liste des employés sera générée en JavaScript -->
                </div>
            </section>

            <!-- Section Chat -->
            <section id="chat" class="admin-section">
                <h2>Messagerie</h2>
                <div class="chat-container">
                    <div class="chat-messages" id="chat-messages">
                        <!-- Les messages seront générés en JavaScript -->
                    </div>
                    <div class="chat-input">
                        <input type="text" placeholder="Écrivez votre message..." id="message-input">
                        <button onclick="sendMessage()">Envoyer</button>
                    </div>
                </div>
            </section>

            <!-- Section Paramètres -->
            <section id="settings" class="admin-section">
                <h2>Paramètres</h2>
                <div class="settings-form">
                    <div class="form-group">
                        <label>Nom de l'établissement</label>
                        <input type="text" value="MentalSerenity">
                    </div>
                    <div class="form-group">
                        <label>Email de contact</label>
                        <input type="email" value="contact@mentalserenity.fr">
                    </div>
                    <div class="form-group">
                        <label>Horaires d'ouverture</label>
                        <input type="text" value="Lun-Ven: 9h-18h">
                    </div>
                    <button class="btn-primary" onclick="saveSettings()">Enregistrer</button>
                </div>
            </section>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
