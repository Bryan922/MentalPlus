<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification - MentalSerenity</title>
    <link rel="stylesheet" href="css/auth.css">
    
    <script>
    // La configuration de l'authentification sera mise à jour avec PlanetScale
    </script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Connexion</button>
            <button class="tab-btn" data-tab="register">Créer un compte</button>
            <button class="tab-btn" data-tab="admin">Espace Admin</button>
        </div>

        <div class="auth-content">
            <!-- Formulaire de connexion -->
            <form id="login-form" class="auth-form active" data-form="login">
                <h2>Connexion</h2>
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="login-password" name="password" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="remember-me" name="remember">
                        Se souvenir de moi
                    </label>
                </div>
                <button type="submit" class="btn-primary">Se connecter</button>
            </form>

            <!-- Formulaire d'inscription -->
            <form id="register-form" class="auth-form" data-form="register">
                <h2>Créer un compte</h2>
                <div class="form-group">
                    <label for="register-name">Nom complet</label>
                    <input type="text" id="register-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="register-password" name="password" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">Confirmer le mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="register-confirm-password" name="confirm_password" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">S'inscrire</button>
            </form>

            <!-- Formulaire de connexion admin -->
            <form id="admin-form" class="auth-form" data-form="admin">
                <h2>Connexion Admin</h2>
                <div class="form-group">
                    <label for="admin-email">Email administrateur</label>
                    <input type="email" id="admin-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="admin-password">Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="admin-password" name="password" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Connexion Admin</button>
            </form>
        </div>
    </div>
</body>
</html>
