<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification - MentalSerenity</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">
                <i class="fas fa-sign-in-alt"></i> Connexion
            </button>
            <button class="tab-btn" data-tab="register">
                <i class="fas fa-user-plus"></i> Créer un compte
            </button>
            <button class="tab-btn" data-tab="admin">
                <i class="fas fa-user-shield"></i> Espace Admin
            </button>
        </div>

        <div class="auth-content">
            <!-- Formulaire de connexion -->
            <form id="login-form" class="auth-form active" data-form="login">
                <h2>Connexion à votre compte</h2>
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" required placeholder="Votre adresse email">
                </div>
                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="login-password" name="password" required placeholder="Votre mot de passe">
                        <button type="button" class="toggle-password" aria-label="Afficher/Masquer le mot de passe">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me" name="remember">
                        Se souvenir de moi
                    </label>
                </div>
                <button type="submit" class="btn-primary">Se connecter</button>
                <div id="login-error" class="error-message"></div>
            </form>

            <!-- Formulaire d'inscription -->
            <form id="register-form" class="auth-form" data-form="register">
                <h2>Créer un nouveau compte</h2>
                <div class="form-group">
                    <label for="register-name">Nom complet</label>
                    <input type="text" id="register-name" name="name" required placeholder="Votre nom complet">
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" name="email" required placeholder="Votre adresse email">
                </div>
                <div class="form-group">
                    <label for="register-password">Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="register-password" name="password" required placeholder="Choisissez un mot de passe">
                        <button type="button" class="toggle-password" aria-label="Afficher/Masquer le mot de passe">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">Confirmer le mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="register-confirm-password" name="confirm_password" required placeholder="Confirmez votre mot de passe">
                        <button type="button" class="toggle-password" aria-label="Afficher/Masquer le mot de passe">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Créer mon compte</button>
                <div id="register-error" class="error-message"></div>
            </form>

            <!-- Formulaire de connexion admin -->
            <form id="admin-form" class="auth-form" data-form="admin">
                <h2>Espace Administrateur</h2>
                <div class="form-group">
                    <label for="admin-email">Email administrateur</label>
                    <input type="email" id="admin-email" name="email" required placeholder="Email administrateur">
                </div>
                <div class="form-group">
                    <label for="admin-password">Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="admin-password" name="password" required placeholder="Mot de passe administrateur">
                        <button type="button" class="toggle-password" aria-label="Afficher/Masquer le mot de passe">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Connexion Admin</button>
                <div id="admin-error" class="error-message"></div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Gestion des onglets
            const tabs = document.querySelectorAll('.tab-btn');
            const authForms = document.querySelectorAll('.auth-form');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // Retirer la classe active de tous les onglets et formulaires
                    tabs.forEach(t => t.classList.remove('active'));
                    authForms.forEach(f => f.classList.remove('active'));

                    // Ajouter la classe active à l'onglet cliqué
                    tab.classList.add('active');
                    const formId = tab.getAttribute('data-tab');
                    document.querySelector(`[data-form="${formId}"]`).classList.add('active');
                });
            });

            // Gestion de l'affichage/masquage des mots de passe
            const toggleButtons = document.querySelectorAll('.toggle-password');
            toggleButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const input = button.parentElement.querySelector('input');
                    const icon = button.querySelector('i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });

            // Gestion des soumissions de formulaires
            document.querySelectorAll('form').forEach(form => {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const formId = form.getAttribute('data-form');
                    const errorDiv = document.getElementById(`${formId}-error`);
                    
                    try {
                        const formData = new FormData(form);
                        const data = Object.fromEntries(formData.entries());
                        
                        // Vérification des mots de passe pour l'inscription
                        if (formId === 'register' && data.password !== data.confirm_password) {
                            throw new Error('Les mots de passe ne correspondent pas');
                        }

                        const response = await fetch(`/api/auth.php?action=${formId}`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(data)
                        });

                        const result = await response.json();
                        
                        if (!response.ok) {
                            throw new Error(result.error || 'Une erreur est survenue');
                        }

                        // Redirection en fonction du rôle
                        if (result.user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'profile.html';
                        }

                    } catch (error) {
                        errorDiv.textContent = error.message;
                        errorDiv.style.display = 'block';
                    }
                });
            });
        });
    </script>
</body>
</html>
