<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MentalSerenity</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">MentalSerenity</div>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="index.html#services">Nos Services</a></li>
                <li><a href="rendez-vous.html">Prendre RDV</a></li>
                <li><a href="#tarifs">Tarifs</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Connexion</button>
                <button class="tab-btn" data-tab="register">Inscription</button>
            </div>

            <!-- Formulaire de connexion -->
            <form id="login-form" class="auth-form active">
                <h2>Connexion à votre compte</h2>
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="login-password" name="password" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Se souvenir de moi</span>
                    </label>
                    <a href="#" class="forgot-password">Mot de passe oublié ?</a>
                </div>
                <button type="submit" class="btn-submit">Se connecter</button>
            </form>

            <!-- Formulaire d'inscription -->
            <form id="register-form" class="auth-form">
                <h2>Créer un compte</h2>
                <div class="form-group">
                    <label for="register-name">Nom</label>
                    <input type="text" id="register-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="register-firstname">Prénom</label>
                    <input type="text" id="register-firstname" name="firstname" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="register-phone">Téléphone</label>
                    <input type="tel" id="register-phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="register-password" name="password" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="register-password-confirm">Confirmer le mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="register-password-confirm" name="password-confirm" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>
                <div class="form-options">
                    <label class="terms">
                        <input type="checkbox" name="terms" required>
                        <span>J'accepte les conditions d'utilisation et la politique de confidentialité</span>
                    </label>
                </div>
                <button type="submit" class="btn-submit">Créer mon compte</button>
            </form>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
